<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet"> 
  <link rel="icon" type="image/png" sizes="32x32" href="images/tarta de queso 2.png">
  <title>Frontend Mentor | Tarta de queso</title>
</head>

<body class="bg-secondary d-flex justify-content-center align-items-center min-vh-100">
  <div class="card overflow-hidden border-0 shadow-sm" style="max-width: 600px;">
    <div class="row g-0">
      <div class="col-md-6 d-flex">
        <img src="images/tarta de queso 2.png" alt="Tarta de queso" class="w-100 h-100 object-fit-cover">
      </div>
      <div class="col-md-6">
        <div class="card-body p-4" style="font-family: 'Montserrat', sans-serif;">
          <p class="text-uppercase text-muted small mb-2">Tarta de Queso</p>
          <h1 class="fw-bold mb-3" style="font-family: 'Fraunces', serif;">
            Tarta du Tonas
          </h1>
          <p class="text-muted mb-4">
            Pieza de orfebreria artesanal hecha a mano por los mejores Tonas del mercado.
          </p>
          <div class="d-flex align-items-center gap-3 mb-4">
            <span class="text-success fs-2 fw-bold" style="font-family: 'Fraunces', serif;">
              149.99€
            </span>
            <span class="text-muted text-decoration-line-through">
              169.99€
            </span>
          </div>
          <button class="btn btn-success w-100 d-flex justify-content-center align-items-center gap-2 py-3 fw-bold">
            <img src="images/icon-cart.svg" alt="cart" width="18" height="18">
            Añadir al carrito
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
